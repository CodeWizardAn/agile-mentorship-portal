<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>

<body>

<h1>{{ role.capitalize() }} Login</h1>

<input type="email" placeholder="Email">

<br><br>

<input type="password" placeholder="Password">

<br><br>
{% if role == "mentor" %}
<a href="/mentor-dashboard">
    <button>Login</button>
</a>

{% elif role == "mentee" %}
<a href="/mentee-dashboard">
    <button>Login</button>
</a>

{% else %}
<a href="/admin-dashboard">
    <button>Login</button>
</a>
{% endif %}

</body>
</html>
