<!DOCTYPE html>
<html>
<head>
    <title>Mentor Profile</title>
</head>

<body>

<h1>Update Your Profile</h1>
<p>Welcome, {{ user.full_name }}</p>

<hr>

<h2>Profile Photo</h2>
{% if user.profile_photo %}
<img src="{{ user.profile_photo }}" width="100" style="border-radius:50%; margin-bottom:10px; display:block;">
{% else %}
<p>No photo uploaded yet.</p>
{% endif %}

<form action="/upload/profile-photo" method="post" enctype="multipart/form-data">
    <input type="file" name="file" accept=".jpg,.jpeg,.png" required>
    <br><br>
    <button type="submit">Upload Photo</button>
</form>

<hr>

<h2>Profile Details</h2>
<form action="/mentor-profile/update" method="post">

    <input
        type="text"
        name="expertise"
        placeholder="Expertise (e.g. Python, Agile, ML)"
    >
    <br><br>

    <input
        type="number"
        name="experience_years"
        placeholder="Years of Experience"
    >
    <br><br>

    <textarea
        name="bio"
        placeholder="Short bio about yourself"
        rows="4"
        cols="40"
    ></textarea>
    <br><br>

    <input
        type="url"
        name="linkedin_url"
        placeholder="LinkedIn URL"
    >
    <br><br>

    <button type="submit">Update Profile</button>

</form>

<hr>

<br>
<a href="/mentor/certificates">My Certificates</a>
<br><br>
<a href="/mentor-dashboard">Back to Dashboard</a>
<br><br>
<a href="/logout">Logout</a>

</body>
</html>
