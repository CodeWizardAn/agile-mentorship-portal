<!DOCTYPE html>
<html>
<head>
    <title>Manage Programs</title>
</head>
<body>

<h1>Manage Programs</h1>
<a href="/admin-dashboard">Back to Dashboard</a>

<br><br>

<!-- ── CREATE PROGRAM ── -->
<h2>Create New Program</h2>

<form action="/admin/programs/create" method="post">

    <input
        type="text"
        name="title"
        placeholder="Program Title"
        required
    >
    <br><br>

    <textarea
        name="description"
        placeholder="Description"
        rows="3"
        cols="40"
    ></textarea>
    <br><br>

    <input
        type="text"
        name="category"
        placeholder="Category (e.g. Tech, Business)"
    >
    <br><br>

    <input
        type="number"
        name="duration_weeks"
        placeholder="Duration in Weeks"
    >
    <br><br>

    <label>Start Date</label>
    <input type="date" name="start_date">
    <br><br>

    <label>End Date</label>
    <input type="date" name="end_date">
    <br><br>

    <input
        type="text"
        name="assigned_mentor"
        placeholder="Mentor Profile ID (e.g. MTR0001)"
    >
    <br><br>

    <button type="submit">Create Program</button>

</form>

<hr>

<!-- ── ALL PROGRAMS ── -->
<h2>All Programs</h2>

{% for program in programs %}
<div>
    <p><b>ID:</b> {{ program.program_id }} | <b>Title:</b> {{ program.title }} | <b>Status:</b> {{ program.status }}</p>

    <!-- Update Form -->
    <form action="/admin/programs/update/{{ program.program_id }}" method="post">
        <input type="text" name="title" placeholder="New Title" value="{{ program.title }}">
        <input type="text" name="category" placeholder="Category" value="{{ program.category }}">
        <input type="text" name="assigned_mentor" placeholder="Mentor ID" value="{{ program.assigned_mentor }}">
        <select name="status">
            <option value="draft" {% if program.status == 'draft' %}selected{% endif %}>Draft</option>
            <option value="active" {% if program.status == 'active' %}selected{% endif %}>Active</option>
            <option value="completed" {% if program.status == 'completed' %}selected{% endif %}>Completed</option>
        </select>
        <button type="submit">Update</button>
    </form>

    <!-- Delete Form -->
    <form action="/admin/programs/delete/{{ program.program_id }}" method="post">
        <button type="submit" onclick="return confirm('Delete this program?')">Delete</button>
    </form>

    <hr>
</div>
{% else %}
<p>No programs yet.</p>
{% endfor %}

</body>
</html>
