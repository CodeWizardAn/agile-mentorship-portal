<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
</head>

<body>

<h1>{{ role.capitalize() }} Registration</h1>

<form action="/signup/{{ role }}" method="post">

    <input
        type="text"
        name="full_name"
        placeholder="Full Name"
        required
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    {% if role == "mentor" %}
    <input
        type="text"
        name="invite_code"
        placeholder="Enter Invite Code"
        required
    >
    <br><br>
    {% endif %}

    <button type="submit">
        Create Account
    </button>

</form>

<br>

<a href="/login/{{ role }}">
    Already have an account? Login
</a>

</body>
</html>
